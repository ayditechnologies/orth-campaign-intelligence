<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORTH · Campaign Intelligence · 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink-950: #0c0f13; --ink-900: #141719; --ink-800: #1e2226; --ink-700: #2e3337;
  --ink-600: #404549; --ink-500: #585d62; --ink-400: #757a7f; --ink-300: #979b9f;
  --ink-200: #bcbfc3; --ink-100: #dcdfe2; --ink-50: #f0f2f4;
  --sage-950: #1c2319; --sage-900: #2f3c2b; --sage-800: #43553e; --sage-700: #536a4c;
  --sage-600: #647f5d; --sage-500: #85aa7b; --sage-400: #9ebb96; --sage-300: #b6ccb0;
  --sage-200: #cce0c8; --sage-100: #e6f0e4; --sage-50: #f5faf4;
  --stone-950: #201d19; --stone-900: #2f2b26; --stone-800: #46413a; --stone-700: #5d564d;
  --stone-600: #6d675f; --stone-500: #7d7871; --stone-400: #9e9a94; --stone-300: #bebbb8;
  --stone-200: #d4d2cf; --stone-100: #e8e7e5; --stone-50: #f5f4f3;
  --amber-600: oklch(0.57 0.155 72); --amber-500: oklch(0.73 0.170 72);
  --amber-400: oklch(0.82 0.135 72); --amber-300: oklch(0.88 0.095 72);
  --red-600: oklch(0.51 0.175 22); --red-400: oklch(0.70 0.160 22);
  --amber: #185FA5;
  --pad: 48px;
}
html { background: var(--ink-950); }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--ink-950);
  color: var(--ink-200);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
.hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 28px var(--pad) 24px;
  position: sticky; top: 0; z-index: 40;
  background: var(--ink-950);
}
.hd-brand { display: flex; align-items: center; gap: 14px; }
.hd-title { font-size: 18px; font-weight: 300; color: var(--ink-200); }
.hd-title span { color: var(--ink-600); }
.hd-meta { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--ink-500); }

/* ── COUNTRY NAV ── */
.country-nav {
  display: flex; align-items: center; gap: 0;
  padding: 0 var(--pad);
  overflow-x: auto;
}
.country-nav-inner {
  display: flex; align-items: center; gap: 0;
  border-bottom: 1px solid var(--ink-800);
  width: 100%;
}
.country-nav::-webkit-scrollbar { height: 2px; }
.country-nav::-webkit-scrollbar-thumb { background: var(--ink-700); }
.c-tab {
  font-size: 13px; font-weight: 500; color: var(--ink-500);
  padding: 14px 20px; cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  white-space: nowrap;
  transition: color 0.15s, border-color 0.15s;
  user-select: none;
}
.c-tab:hover { color: var(--ink-200); }
.c-tab.active { color: var(--ink-100); border-bottom-color: var(--sage-600); }

/* ── MAIN ── */
.main { padding: 0 var(--pad) 80px; }

/* ── COUNTRY PANEL ── */
.c-panel { display: none; }
.c-panel.active { display: block; }

/* ── PANEL HEADER ── */
.panel-hd {
  padding: 52px 0 40px;
  margin-bottom: 0;
}
.panel-name { font-size: 32px; font-weight: 300; color: var(--ink-100); letter-spacing: -0.02em; }
.panel-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 12px; border-radius: 9999px;
  font-size: 11px; font-weight: 500;
  margin-left: 16px; vertical-align: middle;
  position: relative; top: -10px;
}
.panel-badge.hot { background: rgba(100,127,93,0.18); color: var(--sage-400); }
.panel-badge.cool { background: rgba(64,69,73,0.4); color: var(--ink-400); }



/* ── PANEL REGION BLOCK ── */
.panel-intro {
  margin-top: 24px;
  display: flex;
  align-items: flex-start;
  gap: 32px;
  flex-wrap: wrap;
}
.panel-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  flex: 1;
  min-width: 0;
}
.region-pill {
  font-size: 13px;
  font-weight: 400;
  color: var(--ink-300);
  padding: 8px 18px;
  border-radius: 9999px;
  white-space: nowrap;
  background: var(--ink-800);
}
.panel-stats {
  display: flex;
  align-items: baseline;
  gap: 6px;
  flex-shrink: 0;
}
.pstat {
  display: flex;
  align-items: baseline;
  gap: 6px;
}
.pstat-num {
  font-size: 32px;
  font-weight: 300;
  color: #ffffff;
  line-height: 1;
  letter-spacing: -0.02em;
}
.pstat-lbl {
  font-size: 32px;
  font-weight: 300;
  color: #ffffff;
  line-height: 1;
  letter-spacing: -0.02em;
}

/* ── SECTION HEADERS ── */
.section-hd {
  padding: 24px 0 24px;
}
.section-title { font-size: 22px; font-weight: 300; color: var(--ink-400); }
.section-line { display: none; }
.section-note { display: none; }
.section-title { font-size: 13px; font-weight: 500; color: var(--ink-400); }
.section-line { flex: 1; height: 1px; background: var(--ink-800); }
.section-note { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--ink-600); }

/* ── MONTH HEADER ── */
.chart-wrap { position: relative; }
.month-hdr {
  display: grid;
  grid-template-columns: 180px 1fr;
  margin-bottom: 4px;
}
.month-grid { display: grid; grid-template-columns: repeat(12, 1fr); }
.month-lbl {
  font-family: 'DM Mono', monospace; font-size: 10px;
  color: var(--ink-600); text-align: center;
}
.month-lbl.cur { color: var(--sage-500); font-weight: 500; }

/* ── CROP ROWS ── */
.crop-row {
  display: grid; grid-template-columns: 180px 1fr;
  align-items: center; min-height: 48px;
  border-bottom: 1px solid var(--ink-900);
}
.crop-row:first-child { border-top: 1px solid var(--ink-900); }
.crop-meta { padding-right: 20px; text-align: right; }
.crop-name { font-size: 12px; font-weight: 400; color: var(--ink-400); line-height: 1.3; }
.crop-count {
  font-family: 'DM Mono', monospace; font-size: 10px;
  color: var(--ink-600); margin-top: 2px;
}
.crop-tl { position: relative; height: 48px; }
.tl-track {
  position: absolute; top: 17px; left: 0; right: 0;
  height: 14px; background: var(--ink-900); border-radius: 3px;
}
.tl-bar {
  position: absolute; top: 17px; height: 14px;
  border-radius: 3px; cursor: pointer;
  transition: filter 0.12s;
}
.tl-bar:hover { filter: brightness(1.2); }
.tl-bar.critical { background: var(--ink-300); }
.tl-bar.high { background: var(--ink-700); }
.tl-bar.active-now {}

/* Campaign marker — solid triangle capped at bar height (14px) */
.camp-mk {
  position: absolute;
  top: 17px;
  width: 0; height: 0;
  border-style: solid;
  border-width: 7px 0 7px 8px;
  border-color: transparent transparent transparent var(--amber);
  cursor: pointer;
  opacity: 0.9;
  transition: opacity 0.12s;
}
.camp-mk:hover { opacity: 1; }

/* Today line — solid */
.today-line { display: none; }

/* ── FLOATING TOOLTIP ── */
#tooltip {
  position: fixed;
  z-index: 100;
  pointer-events: none;
  display: none;
  max-width: 320px;
}
.tip-inner {
  background: var(--ink-800);
  border: 1px solid var(--ink-700);
  border-radius: 8px;
  padding: 14px 16px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.tip-crop { font-size: 12px; font-weight: 600; color: var(--ink-200); margin-bottom: 4px; }
.tip-window { font-size: 13px; font-weight: 400; color: var(--ink-100); line-height: 1.45; margin-bottom: 8px; }
.tip-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
.tip-badge {
  font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500;
  padding: 2px 8px; border-radius: 4px;
}
.tip-badge.critical { background: var(--sage-900); color: var(--sage-400); }
.tip-badge.high { background: var(--ink-700); color: var(--ink-400); }
.tip-badge.campaign { background: rgba(24,95,165,0.15); color: var(--amber); }
.tip-period { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--ink-500); }
.tip-growers { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--ink-500); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--ink-700); line-height: 1.5; }

/* ── LEGEND ── */
.legend {
  display: flex; align-items: center; gap: 24px;
  padding: 16px 0;
  flex-wrap: wrap;
}
.leg { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--ink-500); }
.leg-bar { width: 18px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.leg-tri {
  width: 0; height: 0; border-style: solid;
  border-width: 5px 0 5px 7px;
  border-color: transparent transparent transparent var(--amber);
  flex-shrink: 0;
}
.leg-line { width: 18px; height: 1px; background: var(--sage-600); flex-shrink: 0; opacity: 0.6; }
.leg-sep { display: none; }

/* ── AGGREGATE SECTION ── */
.agg-grid { margin-bottom: 6px; }
.agg-bars {
  display: grid; grid-template-columns: repeat(12, 1fr);
  gap: 4px; align-items: end;
}
.agg-col { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
.agg-col:hover .agg-fill { filter: brightness(1.15); }
.agg-outer {
  width: 100%; background: var(--ink-900);
  border-radius: 3px; overflow: hidden; position: relative;
}
.agg-fill {
  width: 100%; border-radius: 3px;
  transition: filter 0.12s;
}
.agg-col .month-lbl { margin-top: 4px; }
.agg-score { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--ink-600); }
.agg-left {
  display: flex; align-items: flex-end; padding-right: 20px;
  padding-bottom: 24px;
}
.agg-left-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--ink-600); writing-mode: horizontal-tb; }
.agg-strip {
  background: var(--ink-800); border: 1px solid var(--ink-700);
  border-radius: 8px; padding: 14px 16px;
  font-size: 13px; color: var(--ink-500);
  margin-top: 12px; min-height: 48px; line-height: 1.6;
  transition: border-color 0.15s;
}
.agg-strip.lit { border-color: var(--ink-600); }
.agg-legend {
  display: flex; gap: 20px; margin-top: 16px; flex-wrap: wrap;
}

/* ── FOOTER ── */
.site-footer {
  padding: 0 var(--pad);
}
.site-footer-inner {
  padding: 24px 0;
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 12px;
}
.sf-left { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--ink-600); line-height: 1.8; }
.sf-right { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--ink-700); text-align: right; line-height: 1.8; }


/* ── CLIMATE ALERT ── */
#climate-alert {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(0,0,0,0.72);
  backdrop-filter: blur(4px);
  align-items: center;
  justify-content: center;
}
#climate-alert.visible { display: flex; }
.alert-panel {
  background: var(--ink-900);
  border: 1px solid var(--ink-700);
  border-radius: 12px;
  width: 480px;
  max-width: calc(100vw - 48px);
  overflow: hidden;
  box-shadow: 0 24px 64px rgba(0,0,0,0.6);
}
.alert-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--ink-800);
}
.alert-header-left { display: flex; align-items: center; gap: 10px; }
.alert-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: oklch(0.61 0.195 22);
  box-shadow: 0 0 0 3px rgba(200,60,60,0.2);
  animation: pulse-dot 2s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes pulse-dot {
  0%,100%{ box-shadow: 0 0 0 3px rgba(200,60,60,0.2); }
  50%{ box-shadow: 0 0 0 6px rgba(200,60,60,0.1); }
}
.alert-title { font-size: 13px; font-weight: 500; color: var(--ink-200); }
.alert-close {
  width: 28px; height: 28px; border-radius: 6px;
  border: none; background: transparent; cursor: pointer;
  color: var(--ink-500); font-size: 16px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, color 0.15s;
}
.alert-close:hover { background: var(--ink-800); color: var(--ink-200); }
.alert-body { padding: 20px 24px; }
.alert-location {
  font-family: 'DM Mono', monospace; font-size: 10px;
  color: var(--ink-600); margin-bottom: 14px;
}
.alert-conditions { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.alert-condition {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 14px;
  background: var(--ink-800);
  border-radius: 8px;
  border-left: 2px solid transparent;
}
.alert-condition.frost { border-left-color: #6BB5E8; }
.alert-condition.heat { border-left-color: #E87A4A; }
.alert-condition.humidity { border-left-color: var(--sage-600); }
.alert-condition.wind { border-left-color: var(--ink-400); }
.alert-cond-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
.alert-cond-text {}
.alert-cond-title { font-size: 13px; font-weight: 500; color: var(--ink-200); line-height: 1.3; margin-bottom: 3px; }
.alert-cond-detail { font-size: 12px; color: var(--ink-500); line-height: 1.4; }
.alert-crops { margin-bottom: 20px; }
.alert-crops-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--ink-600); margin-bottom: 8px; }
.alert-crop-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.alert-crop-tag {
  font-size: 11px; font-weight: 500;
  padding: 4px 10px; border-radius: 4px;
  background: rgba(100,127,93,0.15); color: var(--sage-400);
  border: 1px solid rgba(100,127,93,0.25);
}
.alert-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 24px;
  border-top: 1px solid var(--ink-800);
}
.alert-timestamp { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--ink-700); }
.alert-btn {
  font-size: 12px; font-weight: 500;
  padding: 8px 20px; border-radius: 9999px;
  background: var(--sage-600); color: #fff;
  border: none; cursor: pointer;
  transition: background 0.15s;
}
.alert-btn:hover { background: var(--sage-500); }
.weather-btn {
  display: none;
  position: fixed; bottom: 28px; right: 28px;
  z-index: 150;
  background: var(--ink-800); border: 1px solid var(--ink-700);
  border-radius: 9999px; padding: 10px 18px;
  font-size: 12px; font-weight: 500; color: var(--ink-300);
  cursor: pointer; gap: 8px; align-items: center;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  transition: background 0.15s;
}
.weather-btn:hover { background: var(--ink-700); }
.weather-btn.has-alert { border-color: oklch(0.61 0.195 22); color: oklch(0.61 0.195 22); }
.weather-btn.has-alert .weather-btn-dot { background: oklch(0.61 0.195 22); }
.weather-btn-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--ink-500); flex-shrink: 0;
}
.alert-loading { padding: 32px 24px; text-align: center; color: var(--ink-500); font-size: 13px; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--ink-900); }
::-webkit-scrollbar-thumb { background: var(--ink-700); border-radius: 2px; }
</style>
</head>

  <div class="hd-brand">

<nav class="country-nav"><div class="country-nav-inner" id="countryNav"></div></nav>

<div class="main" id="main"></div>

<div id="tooltip"><div class="tip-inner" id="tipInner"></div></div>

function segs(s,e){ return e>=s ? [{s,e}] : [{s,e:11},{s:0,e}]; }
function isActive(s,e){ return segs(s,e).some(g => CM>=g.s && CM<=g.e); }
function countActive(crops){ let c=0; crops.forEach(cr=>cr.w.forEach(w=>{ if(isActive(w.s,w.e)) c++; })); return c; }
function fmt(n){
  if(n>=1000000) return '~'+(n/1000000).toFixed(1)+'M growers';
  if(n>=1000) return '~'+Math.round(n/1000)+'K growers';
  return '~'+n+' growers';
}

function computeMonthly(crops){
  const scores=Array(12).fill(0), growers=Array(12).fill(0);
  const lists=Array.from({length:12},()=>[]);
  crops.forEach(crop=>{
    crop.w.forEach(win=>{
      const w=win.i==='critical'?2:1;
      segs(win.s,win.e).forEach(seg=>{
        for(let m=seg.s;m<=seg.e;m++){
          scores[m]+=w; growers[m]+=crop.g;
          if(!lists[m].find(c=>c.n===crop.n)) lists[m].push({n:crop.n,i:win.i,g:crop.g});
        }
      });
    });
  });
  return {scores,growers,lists};
}

// Tooltip
const tooltip=document.getElementById('tooltip');
const tipInner=document.getElementById('tipInner');
let tipVisible=false;

function showTip(e, html){
  tipInner.innerHTML=html;
  tooltip.style.display='block';
  tipVisible=true;
  moveTip(e);
}
function moveTip(e){
  if(!tipVisible) return;
  const tw=320, th=140;
  let x=e.clientX+16, y=e.clientY-20;
  if(x+tw>window.innerWidth-16) x=e.clientX-tw-16;
  if(y+th>window.innerHeight-16) y=e.clientY-th;
  tooltip.style.left=x+'px';
  tooltip.style.top=y+'px';
}
function hideTip(){
  tooltip.style.display='none';
  tipVisible=false;
}
document.addEventListener('mousemove', moveTip);

function buildPanel(key){
  const d=D[key];
  const ac=countActive(d.crops);
  const {scores,growers,lists}=computeMonthly(d.crops);
  const maxScore=Math.max(...scores,1);
  const maxH=100;

  const totalGrowers=d.crops.reduce((s,c)=>s+c.g,0);
  const badgeClass=ac>0?'hot':'cool';
  const badgeText=ac>0?`${ac} window${ac>1?'s':''} active now`:'Low activity this month';

  let html=`
  <div class="c-panel" id="panel-${key}">
    <div class="panel-hd">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap">
        <div style="display:flex;align-items:center;gap:16px">
          <span class="panel-name">${key}</span>
          <span class="panel-badge ${badgeClass}" style="margin-top:24px;margin-left:2px">${badgeText}</span>
        </div>
        <div class="panel-stats">

  `;

  d.crops.forEach(crop=>{

      </div>

        <div class="tl-track"></div>

      <div class="leg-sep"></div>
      <div class="leg"><div class="leg-tri"></div>Campaign sweet spot (month before window opens)</div>
      <div class="leg-sep"></div>
      <div class="leg"><div class="leg-line"></div>Today (Mar 30)</div>
    </div>

    <div class="section-hd" style="margin-top:0;padding-top:64px">
      <div class="section-title">Campaign pressure index</div>
      <div class="section-line"></div>
      <div class="section-note">Aggregated across all ${d.crops.length} crops · critical ×2 · high ×1</div>
    </div>

    <div class="agg-grid">

      <div class="agg-bars" id="aggbars-${key}">`;

  scores.forEach((sc,mi)=>{
    const h=Math.round((sc/maxScore)*maxH);
    const col = sc/maxScore>=0.6 ? '#185FA5' : sc/maxScore>=0.3 ? '#0c3a6b' : 'var(--ink-900)';
    const isCur=mi===CM;
    html+=`<div class="agg-col" data-key="${key}" data-mi="${mi}">
      <div class="agg-score">${sc||''}</div>
      <div class="agg-outer" style="height:${maxH}px;''">
        <div class="agg-fill" style="height:${h}px;background:${col};margin-top:${maxH-h}px"></div>
      </div>
      <div class="month-lbl${isCur?' cur':''}">${M[mi].toUpperCase()}</div>
    </div>`;
  });

  html+=`</div></div>
    <div class="agg-strip" id="aggstrip-${key}">Hover a month to see pressure score, grower reach, and active crops.</div>
  </div>`;

  return {html, scores, growers, lists};
}

// Draw bars onto timelines + attach events
function attachBars(key){
  const d=D[key];
  d.crops.forEach(crop=>{
    const tlId=`tl-${key}-${crop.n.replace(/\W/g,'_')}`;
    const tl=document.getElementById(tlId);
    if(!tl) return;

    crop.w.forEach(win=>{
      const act=isActive(win.s,win.e);
      segs(win.s,win.e).forEach((seg,si)=>{
        const lp=(seg.s/12)*100;
        const wp=((seg.e-seg.s+1)/12)*100;
        const bar=document.createElement('div');
        bar.className=`tl-bar ${win.i}${act?' active-now':''}`;
        bar.style.left=lp+'%';
        bar.style.width=wp+'%';
        const ms=win.s===win.e?M[win.s]:M[win.s]+'–'+M[win.e];
        bar.addEventListener('mouseenter',e=>{
          showTip(e,`
            <div class="tip-crop">${crop.n}</div>
            <div class="tip-window">${win.l}</div>
            <div class="tip-row">
              <span class="tip-badge ${win.i}">${win.i==='critical'?'Critical window':'High pressure'}</span>
              <span class="tip-period">${ms}</span>
            </div>
            <div class="tip-growers">${fmt(crop.g)}</div>
          `);
        });
        bar.addEventListener('mouseleave', hideTip);
        tl.appendChild(bar);

        if(si===0){
          const cl=(win.s-0.65)/12*100;
          if(cl>0.5){
            const mk=document.createElement('div');
            mk.className='camp-mk';
            mk.style.left=cl+'%';
            const pm=(win.s-1+12)%12;
            mk.addEventListener('mouseenter',e=>{
              showTip(e,`
                <div class="tip-crop">${crop.n}</div>
                <div class="tip-window">Campaign sweet spot — target <strong>${M[pm]}</strong> to reach growers before: ${win.l}</div>
                <div class="tip-row">
                  <span class="tip-badge campaign">Sweet spot</span>
                  <span class="tip-period">Reach growers 3–5 weeks before window opens</span>
                </div>
                <div class="tip-growers">${fmt(crop.g)}</div>
              `);
            });
            mk.addEventListener('mouseleave', hideTip);
            tl.appendChild(mk);
          }
        }
      });
    });
  });
}

// Aggregate bar events
function attachAgg(key){
  const {scores,growers,lists}=dataStore[key];
  const bars=document.querySelectorAll(`#aggbars-${key} .agg-col`);
  const strip=document.getElementById(`aggstrip-${key}`);
  bars.forEach(col=>{
    const mi=parseInt(col.dataset.mi);
    const sc=scores[mi];
    col.addEventListener('mouseenter',()=>{
      strip.classList.add('lit');
      if(!sc){strip.textContent='No active decision windows this month.';return;}
      const crops=lists[mi];
      const topCrops=crops.slice(0,5).map(c=>`<span style="color:var(--ink-300)">${c.n}</span>`).join(' · ');
      const more=crops.length>5?` <span style="color:var(--ink-600)">+${crops.length-5} more</span>`:'';
      strip.innerHTML=`<strong style="color:var(--ink-200)">${M[mi]}</strong> &nbsp;·&nbsp; Pressure score <strong style="color:var(--sage-400)">${sc}</strong> &nbsp;·&nbsp; Grower reach <strong style="color:var(--amber)">${fmt(growers[mi])}</strong><br>${topCrops}${more}`;
    });
    col.addEventListener('mouseleave',()=>{
      strip.classList.remove('lit');
      strip.textContent='Hover a month to see pressure score, grower reach, and active crops.';
    });
  });
}

KEYS.forEach(key=>{
  attachBars(key);
  attachAgg(key);
});
// ── CLIMATE ALERT SYSTEM — 14-DAY FORECAST SCANNER ──
const REGIONS = {
  Spain:     { lat: 37.9,  lon: -4.8,   label: 'Córdoba, Andalucía' },
  Germany:   { lat: 51.5,  lon: 10.5,   label: 'Central Germany' },
  France:    { lat: 47.8,  lon: 2.3,    label: 'Beauce / Centre-Val de Loire' },
  Portugal:  { lat: 38.5,  lon: -8.0,   label: 'Alentejo' },
  Mexico:    { lat: 19.5,  lon: -102.0, label: 'Michoacán' },
  Argentina: { lat: -34.6, lon: -60.5,  label: 'Pampas / Buenos Aires' },
  Chile:     { lat: -34.9, lon: -71.0,  label: 'Maule / Colchagua' },
  Peru:      { lat: -8.1,  lon: -79.0,  label: 'La Libertad' },
  Brazil:    { lat: -15.6, lon: -56.1,  label: 'Mato Grosso' },
  'United States': { lat: 36.7, lon: -119.8, label: 'Central Valley, California' }
};

function getActiveCrops(key) {
  return D[key].crops.filter(crop => crop.w.some(w => isActive(w.s, w.e)));
}

function analyzeForecast(data) {
  const daily = data.daily;
  const alerts = [];

  const forecast = daily.time.map((date, i) => ({
    date,
    label: new Date(date+'T12:00:00').toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' }),
    tmin: daily.temperature_2m_min[i],
    tmax: daily.temperature_2m_max[i],
    precip: daily.precipitation_sum[i],
    wind: daily.wind_speed_10m_max[i],
    rh: daily.relative_humidity_2m_max ? daily.relative_humidity_2m_max[i] : null
  }));

  // Frost approaching — tmin < 2°C within 5 days
  const frostDays = forecast.slice(0,5).filter(d => d.tmin < 2);
  if (frostDays.length) {
    const worst = frostDays.reduce((a,b) => a.tmin < b.tmin ? a : b);
    alerts.push({
      type: 'frost', icon: '❄',
      title: `Frost incoming — ${worst.tmin.toFixed(1)}°C on ${worst.label}`,
      detail: 'Sub-zero temperatures approaching. Flowering crops and tender growth at risk. Frost protection decisions needed before this date.'
    });
  }

  // Heat wave — 3+ consecutive days above 36°C
  let streak = [], best = [];
  forecast.slice(0,10).forEach(d => {
    if (d.tmax > 36) streak.push(d);
    else { if (streak.length > best.length) best = streak; streak = []; }
  });
  if (streak.length > best.length) best = streak;
  if (best.length >= 3) {
    alerts.push({
      type: 'heat', icon: '↑',
      title: `Heat wave — ${best.length} days above 36°C from ${best[0].label}`,
      detail: 'Sustained extreme heat will accelerate crop development and increase water demand. Irrigation and harvest timing decisions may need to be brought forward.'
    });
  }

  // Heavy rain — 20mm+ in a single day within 7 days
  const rainDays = forecast.slice(0,7).filter(d => d.precip >= 20);
  if (rainDays.length) {
    alerts.push({
      type: 'humidity', icon: '↓',
      title: `Heavy rain — ${rainDays[0].precip.toFixed(0)}mm on ${rainDays[0].label}`,
      detail: 'Significant precipitation will close spray windows and may delay field operations. Complete planned applications before this date or reschedule after.'
    });
  }

  // Sustained humidity — 5+ consecutive days above 80% RH
  if (daily.relative_humidity_2m_max) {
    let humStreak = [];
    forecast.slice(0,10).forEach(d => {
      if (d.rh && d.rh > 80) humStreak.push(d);
      else humStreak = [];
    });
    if (humStreak.length >= 5) {
      alerts.push({
        type: 'humidity', icon: '~',
        title: `Disease pressure window — ${humStreak.length} days above 80% RH from ${humStreak[0].label}`,
        detail: 'Sustained high humidity opens a fungal disease window. Mildew, botrytis, and rust risk elevated. Preventive spray timing should be set before this period begins.'
      });
    }
  }

  // Sustained high winds — 3+ days above 35 km/h
  let windStreak = [];
  forecast.slice(0,7).forEach(d => {
    if (d.wind > 35) windStreak.push(d);
    else windStreak = [];
  });
  if (windStreak.length >= 3) {
    alerts.push({
      type: 'wind', icon: '→',
      title: `Spray window closing — ${windStreak.length} days above 35 km/h from ${windStreak[0].label}`,
      detail: 'Sustained winds above spray threshold will prevent field treatments for an extended period. Complete applications before this window or plan accordingly.'
    });
  }

  return alerts;
}

async function fetchForecast(key) {
  const r = REGIONS[key];
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${r.lat}&longitude=${r.lon}&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,wind_speed_10m_max,relative_humidity_2m_max&wind_speed_unit=kmh&timezone=auto&forecast_days=14`;
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 7000);
    const res = await fetch(url, { signal: controller.signal });
    clearTimeout(timeout);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    return { data, region: r };
  } catch(e) { return null; }
}

let alertCache = {};

async function checkAndShowAlert(key, force) {
  if (alertCache[key] && !force) { renderAlert(key, alertCache[key]); return; }

  const btn = document.getElementById('weatherBtn');
  const lbl = document.getElementById('weatherBtnLabel');
  lbl.textContent = 'Scanning 14-day forecast…';
  btn.classList.remove('has-alert');

  const result = await fetchForecast(key);
  if (!result) {
    lbl.textContent = 'Forecast unavailable — open file directly in browser';
    document.getElementById('alertBody').innerHTML = `<div class="alert-loading" style="color:var(--ink-500)">
      Forecast data could not be loaded.<br><br>
      Open this file directly in a browser (not inside a preview) to enable incoming weather alerts.<br><br>
      <span style="font-size:11px;color:var(--ink-700)">14-day forecast · Open-Meteo · No API key required</span>
    </div>`;
    return;
  }

  const conditions = analyzeForecast(result.data);
  const activeCrops = getActiveCrops(key);
  alertCache[key] = { conditions, activeCrops, region: result.region };
  renderAlert(key, alertCache[key]);
}

function renderAlert(key, cache) {
  const { conditions, activeCrops, region } = cache;
  const btn = document.getElementById('weatherBtn');
  const lbl = document.getElementById('weatherBtnLabel');

  if (!conditions.length) {
    lbl.textContent = `${region.label} · No exceptional events in 14-day forecast`;
    btn.classList.remove('has-alert');
    return;
  }

  lbl.textContent = `${conditions.length} incoming event${conditions.length>1?'s':''} · ${region.label}`;
  btn.classList.add('has-alert');

  document.getElementById('alertTimestamp').textContent = `${region.label} · 14-day forecast · Open-Meteo`;

  const cropsHtml = activeCrops.length ? `
    <div class="alert-crops">
      <div class="alert-crops-label">Crops in active decision windows</div>
      <div class="alert-crop-tags">${activeCrops.map(c=>`<span class="alert-crop-tag">${c.n}</span>`).join('')}</div>
    </div>` : '';

  document.getElementById('alertBody').innerHTML = `
    <div class="alert-location">${region.label} · Exceptional conditions incoming</div>
    <div class="alert-conditions">${conditions.map(c=>`
      <div class="alert-condition ${c.type}">
        <div class="alert-cond-icon">${c.icon}</div>
        <div class="alert-cond-text">
          <div class="alert-cond-title">${c.title}</div>
          <div class="alert-cond-detail">${c.detail}</div>
        </div>
      </div>`).join('')}
    </div>
    ${cropsHtml}`;

  document.getElementById('climate-alert').classList.add('visible');
}

// Controls — deferred until DOM fully loaded
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('alertClose').addEventListener('click', () => {
    document.getElementById('climate-alert').classList.remove('visible');
  });
  document.getElementById('alertDismiss').addEventListener('click', () => {
    document.getElementById('climate-alert').classList.remove('visible');
  });
  document.getElementById('climate-alert').addEventListener('click', e => {
    if (e.target === document.getElementById('climate-alert'))
      document.getElementById('climate-alert').classList.remove('visible');
  });
  document.getElementById('weatherBtn').addEventListener('click', () => {
    const key = document.querySelector('.c-tab.active')?.dataset?.key || 'Spain';
    document.getElementById('alertBody').innerHTML = '<div class="alert-loading">Scanning 14-day forecast…</div>';
    document.getElementById('climate-alert').classList.add('visible');
    checkAndShowAlert(key, true);
  });
  document.getElementById('countryNav').addEventListener('click', e => {
    const tab = e.target.closest('.c-tab');
    if (tab) checkAndShowAlert(tab.dataset.key, false);
  });
  checkAndShowAlert('Spain', true);
});

</script>
